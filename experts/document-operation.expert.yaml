name: Document Operation Expert
name_en: Document Operation Expert
name_zh: 单据作业专家
capability: document-operation
description: 分析业务单据、表单、字段、作业动作、状态、校验、权限与操作体验要求。
version: 0.1.0
skills:
  - document-operation
keywords:
  - 单据
  - 表单
  - 字段
  - 作业
  - 操作
  - 状态
  - 校验
inputs:
  required:
    - raw_requirements
    - existing_assets
    - output_root
  optional:
    - competitor_reference
    - constraints
    - context
scheduling:
  priority: 80
  dependencies:
    - requirement-clarification
    - rules-management
upstream_artifacts:
  requirement-clarification:
    - requirement-clarification.md
    - scope-and-assumptions.md
    - glossary.md
  rules-management:
    - business-rules.md
    - decision-tables.md
    - rule-parameters.yaml
tools:
  allowed:
    - list_files
    - read_file_chunk
    - grep_search
    - extract_lookup_values
    - write_file
    - patch_file
outputs:
  expected:
    - document-operations.md
    - field-requirements.yaml
    - operation-permissions.md
  evidence:
    - document-operation.json
metadata:
  boundary_contract:
    owns:
      - documents, fields, operations, validation, permissions, status semantics
    excludes:
      - cross-system integration details
      - process orchestration across multiple documents
      - technical UI implementation
    upstream_inputs:
      - requirement-clarification
      - rules-management
  topic_ownership:
    topics:
      - document_objects
      - field_requirements
      - operation_actions
      - validation_rules
      - permissions
      - statuses
    owns_shared_context: false
  routing:
    keywords:
      - 单据
      - 表单
      - 字段
      - 新增
      - 编辑
      - 删除
      - 提交
      - 审核
      - 作废
      - 权限
      - 校验
  prompt_hints:
    file_guidance:
      document-operations.md: 描述单据对象、生命周期状态、用户动作、前置条件、后置结果、校验和异常处理。
      field-requirements.yaml: 结构化字段需求，包含字段名、含义、类型倾向、必填性、来源、校验、展示/编辑条件和追踪来源。
      operation-permissions.md: 输出角色、权限、动作、数据范围和敏感操作控制。
    default_file_guidance: 聚焦单据和作业动作，不展开跨系统接口或完整流程编排。
  delivery_contract:
    must_answer:
      - BA 能否据此确认单据字段、动作、状态和权限。
      - 字段与规则、流程、角色之间是否有可追踪关系。
      - 单据作业的异常和边界行为是否明确。
    evidence_expectations:
      - 字段和动作必须引用 RR、澄清产物、规则产物或竞品参考。
      - 无证据字段必须标注为建议或待确认。
    artifact_review_checklist:
      document-operations.md:
        - 单据对象、动作、状态和异常必须覆盖主要业务作业。
      field-requirements.yaml:
        - 字段结构必须稳定，可被 IR 聚合和后续 IT 设计复用。
      operation-permissions.md:
        - 角色与动作授权关系必须可检查。
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  manual_override_forbidden: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
  on_partial_generation: emit_evidence_and_fail
